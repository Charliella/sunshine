<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>上石國小班級外務登記系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700;900&display=swap');
    :root {
      --morandi-bg: #EAE3D2; --morandi-accent: #607EAA;
      --morandi-highlight: #D4AD7B; --morandi-dark: #2C3333;
    }
    body {
      font-family: "標楷體", "BiauKai", "DFKai-SB", serif;
      background-color: var(--morandi-bg);
      background-image: url('https://www.transparenttextures.com/patterns/p6.png');
      height: 100dvh; width: 100vw; overflow: hidden;
    }
    .paper-card {
      background: rgba(255, 255, 255, 0.6);
      border: 1.5px solid rgba(0, 0, 0, 0.15);
      border-radius: 12px; display: flex; flex-direction: column;
    }
    .shang-shi-neon {
      display: inline-block; animation: super-breath 2.5s infinite ease-in-out;
      font-family: 'Noto Serif TC', serif; font-weight: 900;
    }
    @keyframes super-breath {
      0%, 100% { color: #2C3333; text-shadow: 0 0 5px white; }
      50% { color: #FF0000; text-shadow: 0 0 15px rgba(255,0,0,0.5); transform: scale(1.05); }
    }
    .selected-item { background-color: var(--morandi-accent) !important; color: white !important; }
    .selected-student { background-color: var(--morandi-highlight) !important; color: white !important; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .clock-text { font-family: 'Courier New', monospace; font-weight: 900; letter-spacing: -2px; }
    
    /* 右下角極低調標註：顏色與背景趨近，字體極小化 */
    .copyright-footer {
      position: absolute; bottom: 2px; right: 8px; font-size: 8px;
      color: rgba(44, 51, 51, 0.12); pointer-events: none; font-family: sans-serif;
      text-align: right; line-height: 1.1; z-index: 0;
    }
  </style>
</head>
<body>
  <div id="root" class="h-full w-full"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;
    const STUDENT_LIST = [...Array.from({ length: 29 }, (_, i) => (i + 1).toString()), "師"];
    const FIXED_CLUBS = ["籃球", "扯鈴", "舞蹈", "跆拳道", "智高", "生服隊", "圖書館", "廁所", "外掃區", "田徑", "語文競賽"];
    const CUSTOM_COUNT = 8;
    const STORAGE_KEY = 'shang-shi-v6-storage';

    const App = () => {
      const [time, setTime] = useState(new Date());
      const [selectedStudents, setSelectedStudents] = useState(new Set());
      const [selectedClub, setSelectedClub] = useState(null);
      const [registrations, setRegistrations] = useState([]);
      const [clubList, setClubList] = useState(() => {
        const saved = localStorage.getItem(STORAGE_KEY + '_clubs');
        return saved ? JSON.parse(saved) : [...FIXED_CLUBS, ...Array.from({ length: CUSTOM_COUNT }, (_, i) => `自訂${i + 1}`)];
      });

      useEffect(() => {
        const timer = setInterval(() => setTime(new Date()), 1000);
        return () => clearInterval(timer);
      }, []);

      const handleRegister = () => {
        if (selectedStudents.size === 0 || !selectedClub) return;
        const now = Date.now();
        const newEntries = Array.from(selectedStudents).map((val, idx) => ({
            id: `${now}-${val}-${idx}`, student: val, club: selectedClub
        }));
        setRegistrations(prev => [...prev, ...newEntries]);
        setSelectedStudents(new Set());
      };

      const deleteClub = (c) => confirm(`刪除「${c}」整筆資料？`) && setRegistrations(r => r.filter(x => x.club !== c));
      const deleteOne = (c, s) => setRegistrations(r => r.filter(x => !(x.club === c && x.student === s)));

      const groupedData = useMemo(() => {
        const g = {};
        registrations.forEach(r => {
          if (!g[r.club]) g[r.club] = new Set();
          g[r.club].add(r.student);
        });
        return Object.entries(g).sort();
      }, [registrations]);

      const editClubName = (i) => {
        const oldName = clubList[i];
        const newName = prompt("請輸入新的項目名稱：", oldName);
        if (newName && newName !== oldName) {
          const newList = [...clubList];
          newList[i] = newName;
          setClubList(newList);
          localStorage.setItem(STORAGE_KEY + '_clubs', JSON.stringify(newList));
        }
      };

      return (
        <div className="flex flex-col h-full w-full p-3 lg:p-4 gap-3 overflow-hidden relative">
          <header className="h-[8%] flex justify-between items-end border-b-2 border-stone-800 pb-1 shrink-0">
            <div className="flex items-baseline gap-2">
              <h1 className="text-2xl lg:text-4xl font-black text-stone-800">
                <span className="shang-shi-neon mr-1">上石</span>國小班級外務登記系統
              </h1>
              <span className="text-xs lg:text-sm text-stone-500 font-bold tracking-tight">（限上石國小校內教室使用）</span>
            </div>
            <div className="flex items-center gap-4">
              <span className="text-xl font-bold bg-stone-700 text-white px-4 py-1 rounded-lg">總人次：{registrations.length}</span>
              <button onClick={() => confirm('重置所有資料？') && setRegistrations([])} className="text-red-700 font-bold hover:underline">【重置】</button>
            </div>
          </header>

          <main className="h-[78%] flex flex-row gap-3 overflow-hidden">
            <div className="w-[13%] lg:w-[11%] shrink-0 paper-card">
               <div className="bg-stone-700 text-white py-1 text-center font-bold text-xs">項目</div>
               <div className="flex-grow overflow-y-auto no-scrollbar p-1.5 space-y-1.5">
                  {clubList.map((name, i) => (
                    <div key={i} className="relative group">
                      <div onClick={() => setSelectedClub(name)}
                           className={`py-2 px-1 rounded cursor-pointer text-center text-lg lg:text-xl font-bold border transition-all ${selectedClub === name ? 'selected-item' : 'bg-white/60 hover:border-stone-400'}`}>
                        {name}
                      </div>
                      {i >= FIXED_CLUBS.length && (
                        <button onClick={(e) => { e.stopPropagation(); editClubName(i); }} 
                                className="absolute -top-1 -right-1 bg-amber-500 text-white w-5 h-5 rounded-full text-[10px] shadow-sm hover:bg-amber-600 flex items-center justify-center">✎</button>
                      )}
                    </div>
                  ))}
               </div>
            </div>

            <div className="w-[11%] lg:w-[9%] shrink-0 paper-card">
               <div className="bg-stone-700 text-white py-1 text-center font-bold text-xs">座號</div>
               <div className="flex-grow overflow-y-auto no-scrollbar p-1 grid grid-cols-3 gap-0.5 content-start">
                  {STUDENT_LIST.map(v => (
                    <button key={v} onClick={() => {
                      const n = new Set(selectedStudents);
                      n.has(v) ? n.delete(v) : n.add(v);
                      setSelectedStudents(n);
                    }} className={`h-8 lg:h-9 rounded font-bold text-sm lg:text-lg border ${selectedStudents.has(v) ? 'selected-student' : 'bg-white/80'}`}>
                      {v}
                    </button>
                  ))}
               </div>
            </div>

            <div className="flex-grow paper-card">
                <div className="bg-stone-700 text-white py-2 text-center font-bold flex justify-between px-4 text-lg items-center shrink-0">
                  <span>登記清單</span>
                  <button onClick={() => {
                    const content = groupedData.map(([c, s]) => `${c}: ${Array.from(s).sort((a,b)=>parseInt(a)-parseInt(b)).join(', ')}`).join('\n');
                    navigator.clipboard.writeText(content); alert("已複製！");
                  }} className="bg-white text-stone-800 px-3 py-1 rounded-md text-base font-black">複製名單</button>
                </div>
                <div className="flex-grow overflow-y-auto p-3 space-y-2 no-scrollbar">
                   {groupedData.map(([club, students]) => (
                     <div key={club} className="bg-white/70 px-4 py-2 rounded-lg border-l-8 border-stone-600 shadow flex items-center gap-3">
                        <span onClick={() => deleteClub(club)} className="text-xl lg:text-2xl font-black shrink-0 pr-3 cursor-pointer hover:text-red-600">{club}</span>
                        <div className="flex flex-wrap gap-2 flex-grow justify-end">
                           {Array.from(students).sort((a,b)=>parseInt(a)-parseInt(b)).map(s => (
                             <span key={s} onClick={() => deleteOne(club, s)} className="bg-white border border-stone-300 px-3 py-0.5 rounded cursor-pointer hover:bg-red-100 font-bold text-xl lg:text-2xl">{s}</span>
                           ))}
                        </div>
                     </div>
                   ))}
                </div>
            </div>

            <div className="hidden lg:flex w-[30%] shrink-0 paper-card items-center justify-center bg-stone-800 text-stone-100">
               <div className="text-center p-4">
                  <div className="text-xl font-bold text-stone-400 mb-2 tracking-widest uppercase">Current Time</div>
                  <div className="text-[6vw] leading-none clock-text text-amber-400 drop-shadow-[0_0_10px_rgba(251,191,36,0.3)]">
                    {time.toLocaleTimeString('zh-TW', { hour12: false })}
                  </div>
                  <div className="text-2xl mt-4 font-bold border-t border-stone-600 pt-4">
                    {time.toLocaleDateString('zh-TW', { month: 'long', day: 'numeric', weekday: 'long' })}
                  </div>
               </div>
            </div>
          </main>

          <footer className="h-[10%] flex gap-3 shrink-0 relative">
             <div className="flex-grow paper-card justify-center px-6">
                <div className="text-2xl lg:text-3xl font-bold">
                  {selectedClub ? <span>項目：<span className="text-blue-700">{selectedClub}</span></span> : <span className="text-stone-400">請選擇項目...</span>}
                  {selectedStudents.size > 0 && <span className="ml-8">座號：<span className="text-amber-700">{Array.from(selectedStudents).sort((a,b)=>parseInt(a)-parseInt(b)).join(', ')}</span></span>}
                </div>
             </div>
             <button onClick={handleRegister} className="w-[25%] bg-stone-800 text-white rounded-xl text-3xl font-black hover:bg-black transition-all">確認登記</button>
          </footer>

          <div className="copyright-footer">
            上石國小教師會 製作 版權所有<br/>
            By 林嘉威 老師 (a776663@st.tc.edu.tw)
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
